# =============================================================================
# ChatTLA — LoRA Configuration for DeepSeek-R1-0528-Qwen3-8B Fine-tuning
# =============================================================================
#
# Architecture context
# --------------------
# DeepSeek-R1-0528-Qwen3-8B is a dense Qwen3-based transformer:
#   - 8.2B parameters (all active per forward pass — no MoE)
#   - ~16GB in BF16, fits on a single 48GB GPU for LoRA training
#   - Standard Qwen3 attention + MLP layers
#
# LoRA strategy
# -------------
# target_modules="all-linear" covers all attention (q/k/v/o projections)
# and MLP (gate/up/down projections) layers. For a dense model this is
# comprehensive — no special MoE routing layers to worry about.
#
# Rank choice: r=16 for better capacity on the smaller 8B model.
# The model is small enough that the adapter overhead is negligible.

peft_type: LORA

# --- Core LoRA hyperparameters ---------------------------------------------
r: 16                          # LoRA rank — higher rank for better capacity on 8B model
lora_alpha: 32                 # scaling factor; effective scale = alpha/r = 2.0
lora_dropout: 0.05             # light dropout to prevent overfitting
bias: none

# Target all standard linear layers (attention + MLP projections)
target_modules: "all-linear"

# --- Inference / merge settings -------------------------------------------
merge_weights: false

# --- Adapter metadata -------------------------------------------------------
task_type: CAUSAL_LM
fan_in_fan_out: false
modules_to_save: null
