# =============================================================================
# ChatTLA — LoRA Configuration for gpt-oss-20b Fine-tuning
# =============================================================================
#
# Architecture context
# --------------------
# gpt-oss-20b is a Mixture-of-Experts (MoE) transformer:
#   - 21B total parameters, ~3.6B active per forward pass
#   - MXFP4-quantized MoE weights (loaded via Mxfp4Config(dequantize=True))
#   - MoE expert layers at transformer blocks 7, 15, 23
#
# LoRA strategy
# -------------
# Two-part target:
#   1. target_modules="all-linear" — standard attention + FFN projection layers
#   2. target_parameters — the MoE expert projection layers that "all-linear"
#      would otherwise miss because they are accessed via dynamic routing.
#      Without this, fine-tuning has no gradient signal through the experts.
#
# Rank choice: r=8 is the official cookbook recommendation for the 20b model.
# Higher rank (16, 32) marginally improves fit but doubles adapter size.
# We prefer r=8 to keep the adapter small for fast iteration.

peft_type: LORA

# --- Core LoRA hyperparameters ---------------------------------------------
r: 16                          # LoRA rank — 16 gives strong adaptation for domain-specific tasks
lora_alpha: 32                 # scaling factor; effective scale = alpha/r = 2.0
lora_dropout: 0.05             # light regularization since dataset is small (57 examples)
bias: none

# Target all standard linear layers (attention + FFN + MoE gate/expert projections)
target_modules: "all-linear"

# --- Inference / merge settings -------------------------------------------
# Use the adapter during inference without merging into base weights
# (for fast iteration).  Use merge_lora.py to create a standalone model
# for production deployment.
merge_weights: false

# --- Adapter metadata -------------------------------------------------------
task_type: CAUSAL_LM
fan_in_fan_out: false
modules_to_save: null
